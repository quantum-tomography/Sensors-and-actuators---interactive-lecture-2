<style>
:root { --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#a8b3cf; --accent:#4da3ff; --good:#3ddc97; --bad:#ff5c7a; }
*{ box-sizing:border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
body{ margin:0; background:linear-gradient(160deg,#081022,#0b1220); color:var(--text); }
header{ position:sticky; top:0; backdrop-filter: blur(10px); background:rgba(11,18,32,.7); border-bottom:1px solid rgba(255,255,255,.08); z-index:10; }
.wrap{ max-width:1000px; margin:0 auto; padding:18px; }
.row{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
.title{ font-weight:700; letter-spacing:.2px; }
.sub{ color:var(--muted); font-size:14px; }
.bar{ height:10px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
.bar > div{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#7cc6ff); transition:width .25s ease; }

.h1{ font-size:26px; margin:0 0 10px; display:inline-block; position:relative; }
.h1::after{ content:""; display:block; width:58%; height:3px; margin-top:8px; border-radius:999px; background:linear-gradient(90deg, rgba(77,163,255,.95), rgba(124,198,255,.15)); }

ul{ margin:10px 0 0 18px; color:var(--text); }

button{ border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--text); padding:10px 14px; border-radius:12px; cursor:pointer; }
button:hover{ background:rgba(255,255,255,.10); }
button.primary{ background:rgba(77,163,255,.20); border-color:rgba(77,163,255,.55); }
.footerNav{ position:fixed; bottom:0; left:0; right:0; background:rgba(11,18,32,.75); border-top:1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
.footerNav .wrap{ display:flex; justify-content:space-between; align-items:center; gap:12px; }

.book p{ color:var(--text); line-height:1.85; margin:10px 0; font-size:16px; }
.book p.lead{ color:#d8e6ff; font-size:16px; }
.book .dropcap:first-letter{ float:left; font-size:42px; line-height:38px; padding:6px 8px 0 0; color:#d8e6ff; font-weight:800; }
.quizBox{ margin-top:12px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.03); border-radius:16px; padding:14px; }
.qTitle{ font-weight:800; color:#d8e6ff; margin:0 0 8px; }

.qOptions{ display:grid; gap:10px; }
.qOpt{ text-align:left; border-radius:14px; padding:12px 12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05); }
.qOpt:hover{ background:rgba(255,255,255,.08); }
.qOpt.correct{ border-color:rgba(61,220,151,.55); background:rgba(61,220,151,.12); }
.qOpt.wrong{ border-color:rgba(255,92,122,.55); background:rgba(255,92,122,.12); }
.qFeedback{ margin-top:12px; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.18); color:var(--text); line-height:1.6; }

<header><div class="wrap"><div class="row"><div><div class="title" id="courseTitle"></div><div class="sub" id="courseSub"></div></div><div class="pill"><span id="slideCounter"></span></div></div><div style="margin-top:12px" class="bar"><div id="progressFill"></div></div></div></header>
<main><div class="wrap"><div class="grid"><section class="card cardPad" id="slide"></section><aside class="card cardPad"><div class="h2">Learning outcomes</div><ul id="goals"></ul></aside></div></div></main>
<div class="footerNav"><div class="wrap"><div class="btns"><button id="btnPrev">← Prev</button><button id="btnNext" class="primary">Next →</button></div><div class="sub" id="statusLine"></div></div></div>
<script>
const lessonData = {
  "courseTitle": "Sensors and Actuators - Interactive lecture 2 ",
  "courseSub": "Temperature Measurement",
  "learningOutcomes": [
    "Describe the main idea of the topic.",
    "Identify the most important concepts.",
    "Apply the lecture ideas in a simple example."
  ],
  "slides": [
    {
      "id": "s_hb9x9kgn",
      "type": "content",
      "title": "Short theory",
      "text": "<h2>Temperature Measurement<\/h2>\n\n<h3>Background<\/h3>\n\n<p>\nMost temperature measurement methods can be classified into two main categories:\n<b>contact<\/b> and <b>non-contact<\/b>.\n<\/p>\n\n<p>\nIn contact methods, heat exchange between the sensor and the measured object occurs through \n<b>conduction<\/b> and <b>convection<\/b>. In non-contact methods (also known as \n<b>pyrometric methods<\/b>), temperature is determined by measuring \n<b>thermal radiation<\/b>.\n<\/p>\n\n<p>\nThis exercise focuses on <b>contact temperature measurement<\/b> using electrical sensors.\nIn modern industrial and electronic systems, temperature is measured primarily using \n<b>electrical thermometers<\/b> with thermosensitive primary transducers.\n<\/p>\n\n<p>\nThese transducers can be classified as <b>active<\/b> or <b>passive<\/b>. Passive transducers are widely used and rely on the dependence of electrical resistance on temperature.\n<\/p>\n\n<p>\nTwo main types of passive thermosensitive elements are used:\n<\/p>\n\n<ul>\n  <li>\n    <b>Metallic resistance temperature detectors (RTDs)<\/b>, where resistance increases with temperature \n    (positive temperature coefficient).\n  <\/li>\n  <li>\n    <b>Thermistors<\/b>, typically semiconductor devices with a <b>negative temperature coefficient (NTC)<\/b>, \n    characterized by much higher sensitivity but strong <b>nonlinearity<\/b>.\n  <\/li>\n<\/ul>\n\n<p>\nRTDs provide high accuracy and stability but relatively low sensitivity, while thermistors offer high sensitivity at the cost of nonlinear behavior, which must be compensated in practical applications.\n<\/p>\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/thermistor_wire_resistance_vs_temp.png\" target=\"_blank\">\n    <img src=\"images/thermistor_wire_resistance_vs_temp.png\" alt=\"Dependence of resistance on temperature\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Resistance–temperature dependence (click to enlarge)<\/div>\n<\/div>\n\n<p>\nA simple low-power thermostat is shown in the figure below. It uses a <b>thermistor sensor<\/b> in a \n<b>bridge circuit<\/b>. The bridge output is amplified by an <b>operational amplifier<\/b>, \nwhich drives a <b>heater transistor<\/b> supplying current to the heater resistors. \nThese resistors may be omitted if the transistor can safely dissipate the required power \nand is provided with an adequate heat sink.\n<\/p>\n\n<p>\nThe temperature is adjusted by varying the resistance of one bridge arm using a <b>preset resistor<\/b>.\n<\/p>\n\n<p>\nThe device can be used for temperature control in small enclosed environments, such as compact ovens \nor chambers requiring stable thermal conditions.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/simple_thermostat.png\" target=\"_blank\">\n    <img src=\"images/simple_thermostat.png\" alt=\"Simple thermal control\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Thermostat circuit (click to enlarge)<\/div>\n<\/div>\n\n\n\n",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_lybmk1ny",
      "type": "content",
      "title": "Where a stable temperature can be an advantage",
      "text": "<p>\nAn example application of the apparatus described in the previous section is maintaining a crystal oscillator at a nearly constant temperature. Such components are critical in many precision instruments.\n<\/p>\n\n<p>\nThe accuracy of digital timers and frequency counters depends primarily on the stability and precision of their internal time reference. In many cases, this reference is provided by a <b>quartz oscillator<\/b>.\n<\/p>\n\n<p>\nThe accuracy of such oscillators is determined by the properties of the <b>quartz resonator<\/b>. Quartz is a natural <b>piezoelectric material<\/b>.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/Quarz_cut.png\" target=\"_blank\">\n    <img src=\"images/Quarz_cut.png\" alt=\"Common quartz crystal cuts\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Different quartz cut orientations relative to crystallographic axes (click to enlarge)<\/div>\n<\/div>\n\n\n<p>\nWhen a quartz crystal is cut at a specific orientation relative to its <b>crystallographic axes<\/b>, it exhibits strong piezoelectric behavior. Under an applied alternating electric field, the crystal undergoes mechanical deformation (inverse piezoelectric effect), while mechanical vibrations generate an electric response (direct piezoelectric effect). \n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/time_5.png\" target=\"_blank\">\n    <img src=\"images/time_5.png\" alt=\"Quartz Crystal\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Quartz Crystal (click to enlarge)<\/div>\n<\/div>\n\n\n<p>\nAs a result, an <b>electromechanical oscillatory system<\/b> can be established, where standing waves are formed within the crystal. This mechanism allows the crystal to act as a highly stable, frequency-selective element.\n<\/p>\n\n\n\n<p>\nSimilar to a mechanical oscillator, where energy alternates between kinetic and potential forms, in a crystal oscillator the energy oscillates between mechanical and electrical domains. A key advantage of the crystal oscillator is its extremely sharp resonance, resulting in high frequency stability and selectivity.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/time_3.png\" target=\"_blank\">\n    <img src=\"images/time_3.png\" alt=\"Mechanical oscillator\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Mechanical oscillator (click to enlarge)<\/div>\n<\/div>\n\n<p>\nThe resonant frequency is primarily determined by the physical dimensions of the crystal, being inversely proportional to its thickness. Quartz resonators are characterized by a very high <b>quality factor<\/b> (Q &gt; 2·10⁴) and excellent frequency stability (δf/f ≈ 10⁻⁵ to 10⁻⁶).\n<\/p>\n\n<p>\nA key limitation is the dependence of the resonant frequency on the ambient temperature, which must be considered in precision applications.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/table.png\" target=\"_blank\">\n    <img src=\"images/table.png\" alt=\"Relative Frequency Stability\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Relative Frequency Stability (click to enlarge)<\/div>\n<\/div>\n\n\n<p>\nIn this role, the temperature regulator shown above can be used as an approximate temperature stabilizer.\n<\/p>\n<p>\nJust like in an hourglass, where the interval between the “ticks” is determined by the physical constraints of the system - the size and shape of the sand grains, the geometry of the glass, and so on - the “ticks” of an atomic clock are set by its internal constraints.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/time_2.png\" target=\"_blank\">\n    <img src=\"images/time_2.png\" alt=\"What is a clock\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">What is a clock (click to enlarge)<\/div>\n<\/div>\n\n\n<p>\n In this case, these constraints are the laws of quantum mechanics, which are universal and do not change with time or location.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/time.png\" target=\"_blank\">\n    <img src=\"images/time.png\" alt=\"Atomic clock in principle\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">In principle, the atomic clock is not much different than a simple hourglass watch (click to enlarge)<\/div>\n<\/div>\n\n\n<p>\nIn principle, an atomic clock follows the same idea as a simple hourglass: the beat interval is determined by a highly stable and repeatable physical process. \n<p>\nIn an atomic clock, the natural oscillation frequency of an atom is used as the time reference.\n<\/p>\n<p>\nTime is measured by counting the total number of clock ticks using a simple counter.\n<\/p>\n\n\n<div style=\"text-align:center;margin:20px 0;\">\n  <a href=\"images/time_2.png\" target=\"_blank\">\n    <img src=\"images/time_2.png\" alt=\"The clock principle\" style=\"max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;\">\n  <\/a>\n  <div style=\"font-size:0.9em;color:#a8b3cf;margin-top:6px;\">Time measurement principle (click to enlarge)<\/div>\n<\/div>\n\n\n<\/p>",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_e7bjbq4m",
      "type": "content",
      "title": "Using a diode as a sensor",
      "text": "<p>\nThe voltage drop across a semiconductor junction decreases approximately linearly with temperature, with a typical rate of about \n<b>2 to 2.4 mV/°C<\/b>. For silicon-based devices, this relationship remains sufficiently linear over a wide temperature range, \ntypically from about <b>−50°C to +150°C<\/b>.\n<\/p>\n\n<p>\nAn important requirement is that the forward current producing the voltage drop across the diode (used here as a primary transducer) \nmust be maintained within a controlled range, typically around <b>10 µA<\/b>. \n<\/p>",
      "bullets": [],
      "useDropcap": true
    }
  ]
};
let state = { idx:0, quiz:{} };
const $ = (sel) => document.querySelector(sel);
function escapeHtml(str){ return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;"); }
function paragraphsFromText(text){ return String(text || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean); }
function renderContent(sl){ const rawText = String(sl.text || ""); const containsHtml = /<[^>]+>/.test(rawText); let pHtml = ""; if(containsHtml){ pHtml = rawText; } else { paragraphsFromText(rawText).forEach((p,i)=>{ const cls = i===0 ? (sl.useDropcap ? "lead dropcap" : "lead") : ""; pHtml += "<p class=\""+cls+"\">" + escapeHtml(p) + "</p>"; }); } if(!pHtml){ pHtml = "<p class=\"lead dropcap\">Add slide text in the editor.</p>"; } let ul = ""; if((sl.bullets||[]).length){ ul = "<ul>"; sl.bullets.forEach(b=> ul += "<li>"+escapeHtml(b)+"</li>"); ul += "</ul>"; } return "<div class=\"h1\">"+escapeHtml(sl.title)+"</div><div class=\"book\">"+pHtml+ul+"</div>"; }
function renderQuiz(sl){ const prev = state.quiz[sl.id]; const chosen = prev && typeof prev.selectedIndex === "number" ? prev.selectedIndex : null; const answered = !!prev; let opts = ""; sl.options.forEach((txt,i)=>{ let cls = "qOpt"; if(answered){ if(i===sl.correctIndex) cls += " correct"; else if(i===chosen) cls += " wrong"; } opts += "<button class=\""+cls+"\" data-i=\""+i+"\" type=\"button\">"+escapeHtml(txt)+"</button>"; }); const fb = answered ? "<div class=\"qFeedback\">" + (prev.isCorrect ? "✅ Correct. " : "❌ Not quite. ") + escapeHtml(sl.explanation || "") + "</div>" : ""; return "<div class=\"quizBox\"><div class=\"qTitle\">"+escapeHtml(sl.title)+"</div><p class=\"qPrompt\">"+escapeHtml(sl.question||"")+"</p><div class=\"qOptions\">"+opts+"</div>"+fb+"</div>"; }
function wireQuiz(sl){ document.querySelectorAll(".qOpt").forEach(btn => { btn.onclick = () => { const i = Number(btn.getAttribute("data-i")); state.quiz[sl.id] = { selectedIndex:i, isCorrect:i === sl.correctIndex }; render(); }; }); }
function render(){ $("#courseTitle").textContent = lessonData.courseTitle; $("#courseSub").textContent = lessonData.courseSub; const goals = $("#goals"); goals.innerHTML = ""; (lessonData.learningOutcomes || []).forEach(g => { const li = document.createElement("li"); li.textContent = g; goals.appendChild(li); }); state.idx = Math.max(0, Math.min(state.idx, lessonData.slides.length - 1)); $("#slideCounter").textContent = (state.idx + 1) + " / " + lessonData.slides.length; $("#progressFill").style.width = (((state.idx + 1)/lessonData.slides.length) * 100) + "%"; const sl = lessonData.slides[state.idx]; $("#slide").innerHTML = sl.type === "quiz" ? renderQuiz(sl) : renderContent(sl); $("#statusLine").textContent = sl.type === "quiz" ? "Quick Check" : "Reading slide"; $("#btnPrev").disabled = state.idx === 0; $("#btnNext").disabled = state.idx === lessonData.slides.length - 1; if(sl.type === "quiz") wireQuiz(sl); }
$("#btnPrev").onclick = () => { state.idx = Math.max(0, state.idx - 1); render(); };
$("#btnNext").onclick = () => { state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); };
document.addEventListener("keydown", (e) => { if(e.key === "ArrowLeft"){ state.idx = Math.max(0, state.idx - 1); render(); } else if(e.key === "ArrowRight"){ state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); } });
render();
</script>
